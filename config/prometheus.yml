# Configuración de Prometheus - Sistema OCR FGJCDMX
# Desarrollador: Eduardo Lozada Quiroz, ISC
# Año: 2025

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sistema-ocr-monitor'

scrape_configs:
  # Backend FastAPI
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Elasticsearch
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']

  # MinIO
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
