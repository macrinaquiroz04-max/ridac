# Configuración Docker para PRODUCCIÓN en Fiscalía
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sistema_ocr_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-sistema_ocr}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_MX.UTF-8"
      TZ: America/Mexico_City
    ports:
      - "127.0.0.1:5432:5432"  # Solo localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./backend/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/scripts/create_analisis_juridico_tables.sql:/docker-entrypoint-initdb.d/02-analisis.sql
      - ./backend/scripts/optimize_database_indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_ocr_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sistema_ocr}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"  # Solo localhost
    volumes:
      - documentos_data:/FGJCDMX/documentos
      - exportaciones_data:/FGJCDMX/exportaciones
      - logs_data:/FGJCDMX/logs
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: sistema_ocr_nginx_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Certificados SSL
    networks:
      - sistema_ocr_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  documentos_data:
    driver: local
  exportaciones_data:
    driver: local
  logs_data:
    driver: local

networks:
  sistema_ocr_network:
    driver: bridge
