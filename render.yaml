# render.yaml — Configuración de despliegue en Render (plan Free)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ridac
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements-production.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: UPLOAD_PATH
        value: /tmp/ridac/documentos
      - key: EXPORT_PATH
        value: /tmp/ridac/exportaciones
      - key: TEMP_PATH
        value: /tmp/ridac/temp
      - key: LOG_PATH
        value: /tmp/ridac/logs
      - key: OCR_ENABLE_TESSERACT
        value: "false"
      - key: OCR_ENABLE_EASYOCR
        value: "false"
      - key: OCR_ENABLE_PADDLEOCR
        value: "false"
      - key: OCR_MAX_WORKERS
        value: "1"
      - key: ELASTIC_ENABLED
        value: "false"
      - key: MINIO_ENABLED
        value: "false"
      - key: API_ACCESS_TOKEN
        sync: false
