events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Resolver DNS dinámico - usa el DNS de Docker
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Optimizaciones
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;  # Permitir archivos grandes (PDFs de tomos)

    # Compresión GZIP optimizada para respuestas grandes (JSON, HTML)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;  # Balance entre velocidad y compresión
    gzip_buffers 16 8k;  # Buffers más grandes para archivos grandes
    gzip_min_length 1000;  # Solo comprimir archivos > 1KB
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/xml+rss 
        application/rss+xml 
        application/x-javascript
        application/atom+xml
        application/ld+json
        font/truetype 
        font/opentype 
        application/vnd.ms-fontobject 
        image/svg+xml
        image/x-icon;
    gzip_disable "msie6";  # Deshabilitar para IE6
    
    # Caché de archivos estáticos
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 90s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Servidor para cualquier IP - mantiene nombre enmascarado
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Variable para backend dinámico - se resuelve en cada petición
        # Esto evita que nginx cachee la IP y falle al reiniciar servicios
        set $backend_server backend:8000;

        # Documentación de la API (sin /api/ prefix)
        location ~ ^/(docs|redoc|openapi.json)$ {
            proxy_pass http://$backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Health check del backend (sin /api/ prefix)
        location /health {
            proxy_pass http://$backend_server/health;
            proxy_http_version 1.1;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # Proxy para API backend (MANTIENE el prefijo /api/)
        # Usa regex para capturar tanto /api como /api/ y todo lo que sigue
        location ~ ^/api(/.*)?$ {
            client_max_body_size 500M;  # Permitir archivos grandes (PDFs de tomos)
            proxy_pass http://$backend_server$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 600s;  # Timeout largo para procesamiento OCR
            proxy_connect_timeout 75s;
            proxy_send_timeout 600s;
        }

        # Servir archivos estáticos del frontend
        # Prioridad: archivo exacto, archivo con .html, directorio, index.html
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Archivos JavaScript SIN caché (desarrollo)
        location ~* \.js$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Otros archivos estáticos con caché
        location ~* \.(jpg|jpeg|png|gif|ico|css|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
