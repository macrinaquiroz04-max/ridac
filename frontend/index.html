<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Eduardo Lozada Quiroz, ISC">
    <meta name="copyright" content="© 2025 Eduardo Lozada Quiroz - UAyC">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Login - Sistema OCR FGJCDMX</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2c5aa0;
            --accent-color: #dc3545;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --dark-color: #2c3e50;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --border-radius: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            pointer-events: none;
        }
        
        .login-container { 
            background: var(--white);
            padding: 30px 25px; 
            border-radius: var(--border-radius); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%; 
            max-width: 380px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            margin: 20px;
        }
        
        .logo { text-align: center; margin-bottom: 25px; }
        
        .logo img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            margin-bottom: 1rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--light-bg), var(--white));
            padding: 10px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }
        
        .logo img:hover {
            transform: scale(1.05);
        }
        
        .logo h1 { 
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 26px; 
            margin-bottom: 6px; 
            font-weight: 800;
        }
        
        .logo p { 
            color: #666; 
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group { margin-bottom: 20px; }
        
        .form-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: var(--dark-color); 
            font-weight: 600;
            font-size: 15px;
        }
        
        .form-group input { 
            width: 100%; 
            padding: 12px 18px; 
            border: 2px solid #e9ecef; 
            border-radius: 25px; 
            font-size: 15px; 
            transition: all 0.3s ease;
            background: var(--light-bg);
        }
        
        .form-group input:focus { 
            outline: none; 
            border-color: var(--secondary-color);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.3);
        }
        
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 90, 160, 0.4);
        }
        
        .btn:disabled { 
            background: #ccc; 
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .error { 
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24; 
            padding: 15px 20px; 
            border-radius: var(--border-radius); 
            margin-bottom: 25px; 
            border-left: 4px solid var(--accent-color);
            font-weight: 500;
        }
        
        .success { 
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724; 
            padding: 15px 20px; 
            border-radius: var(--border-radius); 
            margin-bottom: 25px; 
            border-left: 4px solid var(--success-color);
            font-weight: 500;
        }
        
        .footer { 
            text-align: center; 
            margin-top: 20px; 
            color: #666; 
            font-size: 13px;
            font-weight: 500;
        }
        
        .footer a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer a:hover {
            color: var(--primary-color);
        }
        
        .loading { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            border: 3px solid #ffffff; 
            border-top: 3px solid transparent; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* Media queries para responsividad */
        @media (max-width: 768px) {
            .login-container {
                padding: 25px 20px;
                margin: 15px;
                max-width: 95%;
            }
            
            .logo img {
                width: 70px;
                height: 70px;
            }
            
            .logo h1 {
                font-size: 22px;
            }
            
            .logo p {
                font-size: 13px;
            }
            
            .form-group input {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .btn {
                padding: 12px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 20px 15px;
                margin: 10px;
            }
            
            .logo img {
                width: 60px;
                height: 60px;
            }
            
            .logo h1 {
                font-size: 20px;
            }
            
            .logo { 
                margin-bottom: 20px; 
            }
            
            .form-group { 
                margin-bottom: 15px; 
            }
        }

        @media (min-height: 800px) {
            .login-container {
                max-width: 400px;
                padding: 35px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="images/Logo_Dependencia.png" alt="Fiscalía CDMX">
            <h1>FGJCDMX</h1>
            <p>Sistema de Procesamiento OCR</p>
        </div>

        <div id="message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
        </form>

        <div class="footer">
            <p>Sistema de Procesamiento OCR - FGJCDMX</p>
        </div>
    </div>

    <script>
        // Configuración optimizada para Sistema OCR FGJCDMX
        const isNginx = window.location.port === '' || window.location.port === '80' || window.location.port === '443';
        const isFGJDomain = window.location.hostname === 'fgj-ocr.local';
        
        // Determinar URL de la API - Priorizar fgj-ocr.local
        const API_URL = (isFGJDomain || window.location.hostname === '172.22.134.61') 
            ? `${window.location.protocol}//${window.location.hostname}/api`
            : isNginx 
                ? `${window.location.protocol}//${window.location.hostname}/api`
                : `${window.location.protocol}//${window.location.hostname}:8000/api`;
        
        console.log('🏛️ Sistema OCR FGJCDMX - Login Page');
        console.log('🌐 Dominio FGJ:', isFGJDomain ? 'SÍ (fgj-ocr.local)' : 'NO');
        console.log('🔧 Modo:', isNginx ? 'Nginx Proxy' : 'Backend Directo');
        console.log('🔗 API URL (Login):', API_URL);
        console.log('📍 Ubicación actual:', window.location.href);
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('message');

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Iniciando sesión...';
            messageDiv.innerHTML = '';

            try {
                console.log('📡 Intentando login en:', `${API_URL}/auth/login`);
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                console.log('📥 Response status:', response.status);
                const data = await response.json();
                console.log('📥 Response data:', data);

                if (response.ok && data.access_token) {
                    // Guardar datos en localStorage
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    console.log('✅ Login exitoso. Token guardado.');
                    console.log('📦 User data:', data.user);
                    messageDiv.innerHTML = '<div class="success">✓ Login exitoso! Redirigiendo...</div>';
                    
                    // Redirigir inmediatamente sin setTimeout
                    // Verificar si requiere cambio de contraseña
                    if (data.user.debe_cambiar_password || data.user.requiere_cambio_password) {
                        console.log('🔄 Usuario debe cambiar contraseña, redirigiendo...');
                        window.location.href = '/cambiar-password';
                    } else {
                        // Redirigir según rol
                        const rol = data.user.rol?.nombre || data.user.rol || 'Usuario';
                        console.log('🔄 Rol detectado:', rol);
                        
                        if (rol.toLowerCase().includes('admin')) {
                            console.log('🔄 Redirigiendo a dashboard (admin)');
                            window.location.href = '/dashboard';
                        } else {
                            console.log('🔄 Redirigiendo a dashboard-usuario');
                            window.location.href = '/dashboard-usuario';
                        }
                    }
                } else {
                    console.error('❌ Login fallido:', data);
                    messageDiv.innerHTML = `<div class="error">✗ ${data.detail || data.message || 'Error de autenticación'}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = 'Iniciar Sesión';
                }
            } catch (error) {
                console.error('❌ Error en login:', error);
                const errorMsg = isFGJDomain 
                    ? `Error de conexión: ${error.message}<br><small>Verifica conectividad a fgj-ocr.local o usa acceso por IP: http://172.22.134.61/</small>`
                    : `Error de conexión: ${error.message}<br><small>Verifica que el sistema esté ejecutándose en ${API_URL}</small>`;
                messageDiv.innerHTML = `<div class="error">✗ ${errorMsg}</div>`;
                btn.disabled = false;
                btn.innerHTML = 'Iniciar Sesión';
            }
        }

        // Verificar si ya está logueado
        window.onload = () => {
            const token = localStorage.getItem('token');
            if (token) {
                console.log('✅ Token encontrado, redirigiendo a dashboard...');
                window.location.href = '/dashboard';
            } else {
                console.log('ℹ️ No hay sesión activa');
            }
        };
    </script>
</body>
</html>
