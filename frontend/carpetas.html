<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Gestión de Carpetas - Sistema OCR FGJCDMX</title>
    <link rel="stylesheet" href="css/sistema.css">
    <style>
        .search-box { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .search-box input { 
            flex: 1; 
        }
        
        .folder-list { 
            list-style: none; 
        }
        
        .folder-item { 
            background: var(--white);
            margin: 15px 0; 
            padding: 25px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .folder-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .folder-info { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            flex: 1; 
        }
        
        .folder-icon {
            font-size: 32px;
            color: var(--secondary-color);
        }
        
        .folder-details h3 {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .folder-details p {
            color: #666;
            font-size: 14px;
        }
        
        .folder-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
        }
        
        .stat-card h3 {
            color: var(--dark-color);
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .progress-fill {
            background: linear-gradient(135deg, var(--success-color), #34ce57);
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .folder-icon { 
            font-size: 24px; 
        }
        
        .folder-details h4 { 
            margin: 0; 
            color: #333; 
        }
        
        .folder-details p { 
            margin: 5px 0 0 0; 
            color: #666; 
            font-size: 14px; 
        }
        
        .folder-actions { 
            display: flex; 
            gap: 10px; 
        }
        
        .breadcrumb { 
            margin-bottom: 20px; 
            font-size: 16px; 
            color: #666; 
        }
        
        #subirProgreso { 
            background: #e9ecef; 
            padding: 15px; 
            border-radius: 5px; 
            margin: 15px 0; 
        }
        
        #barraProgreso { 
            background: #28a745; 
            height: 20px; 
            border-radius: 10px; 
            transition: width 0.3s; 
        }
        
        .estado-procesado { 
            color: #28a745; 
            font-weight: bold; 
        }
        
        .estado-procesando { 
            color: #ffc107; 
            font-weight: bold; 
        }
        
        .estado-pendiente { 
            color: #6c757d; 
            font-weight: bold; 
        }
        
        .estado-error { 
            color: #dc3545; 
            font-weight: bold; 
        }
        
        .tomo-meta { 
            font-size: 13px; 
            color: #666; 
            margin: 5px 0; 
        }
        
        .tomo-meta strong { 
            color: #333; 
        }
        
        .reanalizar-btn { 
            background: #17a2b8; 
            color: white; 
            padding: 6px 12px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
        }
        
        .reanalizar-btn:hover { 
            background: #138496; 
        }
        
        /* Estilos mejorados para modal de tomo */
        .modal-content {
            margin: 2vh auto !important;
            padding: 20px 18px !important;
            width: 90% !important;
            max-width: 480px !important;
            max-height: 95vh !important;
            overflow-y: auto !important;
        }
        
        .form-group {
            margin-bottom: 15px !important;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--dark-color);
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 18px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: var(--light-bg);
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }
        
        .close {
            font-size: 24px !important;
        }
        
        /* Media queries para responsividad */
        @media (max-width: 768px) {
            .modal-content {
                margin: 1vh auto !important;
                padding: 15px 12px !important;
                width: 95% !important;
                max-width: none !important;
                max-height: 98vh !important;
            }
            
            .form-group input,
            .form-group textarea {
                padding: 8px 12px;
                font-size: 13px;
                border-radius: 15px;
            }
            
            .form-group label {
                font-size: 13px;
            }
            
            .form-group {
                margin-bottom: 12px !important;
            }
            
            .close {
                font-size: 20px !important;
            }
        }

        @media (max-width: 480px) {
            .modal-content {
                margin: 0.5vh auto !important;
                padding: 12px 8px !important;
                width: 98% !important;
                max-height: 99vh !important;
            }
            
            .form-group input,
            .form-group textarea {
                padding: 8px 10px;
                font-size: 12px;
            }
            
            .form-group label {
                font-size: 12px;
            }
            
            .form-group {
                margin-bottom: 10px !important;
            }
            
            .btn-primary, .btn-secondary {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        @media (min-height: 900px) {
            .modal-content {
                margin: 3vh auto !important;
                padding: 25px 20px !important;
                max-width: 500px !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📁 Gestión de Expedientes</h1>
        <div class="user-info">
            <span id="userInfo">Cargando...</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <!-- Contenedor de Carpetas -->
        <div id="carpetasContainer">
            <div class="card">
                <div class="breadcrumb" id="breadcrumb">
                    <span onclick="volverACarpetas()" style="cursor: pointer; color: #007bff;">🏠 Carpetas</span>
                </div>
                
                <div class="search-box">
                    <input type="text" id="busquedaCarpetas" placeholder="Buscar carpetas..." onkeyup="buscarCarpetas()">
                    <button class="btn-secondary" onclick="buscarCarpetas()">🔍 Buscar</button>
                    <button class="btn-primary" onclick="mostrarModalNuevaCarpeta()">➕ Nueva Carpeta</button>
                    <button class="btn-secondary" onclick="window.location.href='dashboard'">← Dashboard</button>
                </div>
                
                <div id="carpetasList">
                    <div class="loading">Cargando carpetas...</div>
                </div>
            </div>
        </div>

        <!-- Contenedor de Tomos -->
        <div id="tomosContainer" style="display: none;">
            <div class="card">
                <div class="breadcrumb" id="breadcrumbTomos">
                    <span onclick="volverACarpetas()" style="cursor: pointer; color: #007bff;">🏠 Carpetas</span>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>📄 Tomos en esta carpeta</h2>
                    <button id="btnSubirTomo" class="btn-primary" onclick="mostrarModalSubirTomo()" style="display: none;">➕ Subir Tomo</button>
                </div>
                
                <!-- Controles de selección y procesamiento OCR -->
                <div id="controlesTomos" style="display: none; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #dee2e6;">
                    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <button class="btn-secondary" onclick="seleccionarTodos()">
                            ☑️ Seleccionar Todos
                        </button>
                        <button class="btn-secondary" onclick="deseleccionarTodos()">
                            ☐ Deseleccionar Todos
                        </button>
                        <button class="btn-primary" onclick="procesarSeleccionados()" style="font-weight: bold;">
                            ⚙️ Procesar OCR Seleccionados
                        </button>
                        <span id="contadorSeleccionados" style="margin-left: 10px; color: #666; font-size: 14px;">
                            0 tomos seleccionados
                        </span>
                    </div>
                </div>
                
                <div id="tomosList">
                    <div class="loading">Cargando tomos...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nueva/Editar Carpeta -->
    <div id="modalCarpeta" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalCarpeta()">&times;</span>
            <h2 id="modalTitle">Nueva Carpeta</h2>
            <form onsubmit="guardarCarpeta(event)">
                <div class="form-group">
                    <label for="nombreCarpeta">Nombre del Expediente:</label>
                    <input type="text" id="nombreCarpeta" required>
                </div>
                <div class="form-group">
                    <label for="descripcionCarpeta">Descripción:</label>
                    <textarea id="descripcionCarpeta" rows="3"></textarea>
                </div>
                <div id="modalError"></div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn-secondary" onclick="cerrarModalCarpeta()">Cancelar</button>
                    <button type="submit" id="btnGuardar" class="btn-primary">Crear Carpeta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Subir Tomo -->
    <div id="modalTomo" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalTomo()">&times;</span>
            <h2>📄 Subir Nuevo Tomo</h2>
            <form onsubmit="subirTomo(event)">
                <div class="form-group">
                    <label for="nombreTomo">Nombre del Tomo:</label>
                    <input type="text" id="nombreTomo" required>
                </div>
                <div class="form-group">
                    <label for="descripcionTomo">Descripción:</label>
                    <textarea id="descripcionTomo" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="archivoTomo">Archivo PDF:</label>
                    <input type="file" id="archivoTomo" accept=".pdf" required>
                </div>
                <div id="modalTomoError"></div>
                <div id="subirProgreso" style="display: none;">
                    <p id="textoProgreso">Subiendo archivo... ⏳</p>
                    <div style="background: #f0f0f0; border-radius: 5px; overflow: hidden;">
                        <div id="barraProgreso" style="background: #8B0000; height: 20px; width: 0%; transition: width 0.3s;"></div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn-secondary" onclick="cerrarModalTomo()">Cancelar</button>
                    <button type="submit" class="btn-primary">Subir Tomo</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let carpetaActual = null;
        let editandoCarpeta = null;

        // Funciones de Loading
        function showLoading(mensaje = 'Cargando...') {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'globalLoading';
            loadingDiv.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999;';
            loadingDiv.innerHTML = `<div style="background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
                <div style="font-size: 50px; margin-bottom: 15px;">⏳</div>
                <div style="font-size: 18px; font-weight: bold; color: #333;">${mensaje}</div>
            </div>`;
            document.body.appendChild(loadingDiv);
        }

        function hideLoading() {
            const loadingDiv = document.getElementById('globalLoading');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }

        // Verificar autenticación al cargar
        document.addEventListener('DOMContentLoaded', function() {
            verificarAuth();
        });

        async function verificarAuth() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (!response.ok) {
                    window.location.href = 'index';
                    return;
                }

                const user = await response.json();
                document.getElementById('userInfo').textContent = `${user.nombre} (${user.rol})`;
                
                // Ocultar botón "Nueva Carpeta" si no es Admin
                const esAdmin = user.rol === 'admin';
                const btnNuevaCarpeta = document.querySelector('button[onclick="mostrarModalNuevaCarpeta()"]');
                if (btnNuevaCarpeta && !esAdmin) {
                    btnNuevaCarpeta.style.display = 'none';
                }
                
                cargarCarpetas();
            } catch (error) {
                window.location.href = 'index';
            }
        }

        async function cargarCarpetas() {
            const container = document.getElementById('carpetasList');
            container.innerHTML = '<div class="loading">Cargando carpetas...</div>';
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/carpetas`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    throw new Error('Error al cargar carpetas');
                }
                
                const carpetas = await response.json();
                mostrarCarpetas(carpetas);
            } catch (error) {
                container.innerHTML = `<div class="error">Error al cargar carpetas: ${error.message}</div>`;
            }
        }

        function mostrarCarpetas(carpetas) {
            const container = document.getElementById('carpetasList');
            
            // Verificar si el usuario es Admin
            const usuario = JSON.parse(localStorage.getItem('user') || '{}');
            const esAdmin = usuario.rol === 'admin';
            
            if (carpetas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📁 No hay carpetas</h3>
                        <p>No se encontraron carpetas.</p>
                        ${esAdmin ? `<button class="btn-primary" onclick="mostrarModalNuevaCarpeta()">Crear primera carpeta</button>` : ''}
                    </div>
                `;
                return;
            }
            
            const html = `
                <ul class="folder-list">
                    ${carpetas.map(carpeta => `
                        <li class="folder-item">
                            <div class="folder-info">
                                <span class="folder-icon">📁</span>
                                <div class="folder-details">
                                    <h4>${carpeta.nombre}</h4>
                                    <p>${carpeta.descripcion || 'Sin descripción'} • ${carpeta.total_tomos || 0} tomos • Creado por ${carpeta.creador || 'N/A'}</p>
                                </div>
                            </div>
                            <div class="folder-actions">
                                <button class="btn-success" onclick="verAnalisisAdmin(${carpeta.id}, '${carpeta.nombre}')" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); border: none;">
                                    ⚖️ Ver Análisis Jurídico
                                </button>
                                <button class="btn-secondary" onclick="verTomos(${carpeta.id}, '${carpeta.nombre}')">📄 Ver Tomos</button>
                                ${esAdmin ? `<button class="btn-secondary" onclick="editarCarpeta(${carpeta.id}, '${carpeta.nombre}', '${carpeta.descripcion || ''}')">✏️ Editar</button>` : ''}
                                ${esAdmin ? `<button class="btn-danger" onclick="eliminarCarpeta(${carpeta.id}, '${carpeta.nombre}')">🗑️ Eliminar</button>` : ''}
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
            
            container.innerHTML = html;
        }

        async function verTomos(carpetaId, nombreCarpeta) {
            // Verificar si el usuario es Admin
            const usuario = JSON.parse(localStorage.getItem('user') || '{}');
            const esAdmin = usuario.rol === 'admin';
            
            // Ocultar lista de carpetas
            document.getElementById('carpetasContainer').style.display = 'none';
            document.getElementById('tomosContainer').style.display = 'block';
            // Solo mostrar botón de subir si es Admin
            document.getElementById('btnSubirTomo').style.display = esAdmin ? 'inline-block' : 'none';
            
            // Actualizar breadcrumb
            document.getElementById('breadcrumbTomos').innerHTML = `
                <span onclick="volverACarpetas()" style="cursor: pointer; color: #007bff;">🏠 Carpetas</span>
                <span> → 📁 ${nombreCarpeta}</span>
            `;
            
            carpetaActual = carpetaId;
            cargarTomos(carpetaId);
        }

        async function cargarTomos(carpetaId) {
            const container = document.getElementById('tomosList');
            container.innerHTML = '<div class="loading">Cargando tomos...</div>';
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/tomos/${carpetaId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    throw new Error('Error al cargar tomos');
                }
                
                const tomos = await response.json();
                mostrarTomos(tomos);
            } catch (error) {
                container.innerHTML = `<div class="error">Error al cargar tomos: ${error.message}</div>`;
            }
        }

        function mostrarTomos(tomos) {
            const container = document.getElementById('tomosList');
            const controles = document.getElementById('controlesTomos');
            
            // Verificar si el usuario es Admin
            const usuario = JSON.parse(localStorage.getItem('user') || '{}');
            const esAdmin = usuario.rol === 'admin';
            
            if (tomos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📄 No hay tomos</h3>
                        <p>Este expediente no tiene tomos subidos.</p>
                        ${esAdmin ? `<button class="btn-primary" onclick="mostrarModalSubirTomo()">Subir primer tomo</button>` : ''}
                    </div>
                `;
                controles.style.display = 'none';
                return;
            }
            
            // Mostrar controles SOLO si es Admin y hay tomos
            controles.style.display = esAdmin ? 'block' : 'none';
            
            const html = `
                <ul class="folder-list">
                    ${tomos.map(tomo => {
                        const tamanioMB = tomo.tamanio_bytes ? (tomo.tamanio_bytes / (1024 * 1024)).toFixed(1) : 'N/A';
                        const paginas = tomo.numero_paginas || 'N/A';
                        const fechaSubida = new Date(tomo.fecha_subida).toLocaleDateString('es-ES');
                        const usuario = tomo.usuario_subida || 'Desconocido';
                        
                        // Determinar el icono y color del estado
                        let estadoIcon = '';
                        let estadoColor = '';
                        let estadoTexto = '';
                        
                        switch(tomo.estado) {
                            case 'completado':
                                estadoIcon = '✅';
                                estadoColor = '#28a745';
                                estadoTexto = 'Completado';
                                break;
                            case 'procesado':
                                estadoIcon = '✅';
                                estadoColor = '#28a745';
                                estadoTexto = 'Procesado';
                                break;
                            case 'procesando':
                                estadoIcon = '⏳';
                                estadoColor = '#ffc107';
                                estadoTexto = 'Procesando';
                                break;
                            case 'pendiente':
                                estadoIcon = '⏸️';
                                estadoColor = '#6c757d';
                                estadoTexto = 'Pendiente';
                                break;
                            case 'error':
                                estadoIcon = '❌';
                                estadoColor = '#dc3545';
                                estadoTexto = 'Error';
                                break;
                            default:
                                estadoIcon = '❓';
                                estadoColor = '#6c757d';
                                estadoTexto = tomo.estado;
                        }
                        
                        return `
                            <li class="folder-item">
                                <div class="folder-info">
                                    ${esAdmin ? `<input type="checkbox" class="tomo-checkbox" data-tomo-id="${tomo.id}" 
                                           style="margin-right: 15px; width: 20px; height: 20px; cursor: pointer;">` : ''}
                                    <span class="folder-icon">📄</span>
                                    <div class="folder-details">
                                        <h4>Tomo ${tomo.numero_tomo}: ${tomo.nombre_archivo}</h4>
                                        <p>
                                            📦 ${tamanioMB} MB • 
                                            📑 ${paginas} páginas • 
                                            <span style="color: ${estadoColor};">${estadoIcon} ${estadoTexto}</span>
                                        </p>
                                        <p style="font-size: 12px; color: #666;">
                                            📅 Subido el ${fechaSubida} por ${usuario}
                                        </p>
                                    </div>
                                </div>
                                <div class="folder-actions">
                                    ${esAdmin ? `<button class="btn-secondary" onclick="descargarTomo(${tomo.id}, '${tomo.nombre_archivo}')">⬇️ Descargar</button>` : ''}
                                    <button class="btn-secondary" onclick="verOCR(${tomo.id})">👁️ Ver OCR</button>
                                    ${esAdmin ? `<button class="btn-primary" onclick="procesarOCRTomo(${tomo.id}, '${tomo.nombre_archivo}')">⚙️ Procesar OCR</button>` : ''}
                                    ${esAdmin ? `<button class="btn-success" onclick="analizarConIA(${tomo.id}, '${tomo.nombre_archivo}')" style="background: #28a745;">🤖 Analizar con IA</button>` : ''}
                                    ${esAdmin && (tomo.estado === 'error' || tomo.numero_paginas === 0) ? 
                                        `<button class="reanalizar-btn" onclick="reanalizarTomo(${tomo.id})">🔄 Reanalizar</button>` : ''
                                    }
                                    ${esAdmin ? `<button class="btn-danger" onclick="eliminarTomo(${tomo.id}, '${tomo.nombre_archivo}')">🗑️ Eliminar</button>` : ''}
                                </div>
                            </li>
                        `;
                    }).join('')}
                </ul>
            `;
            
            container.innerHTML = html;
            
            // Agregar event listeners a los checkboxes para actualizar el contador (solo si es Admin)
            if (esAdmin) {
                setTimeout(() => {
                    document.querySelectorAll('.tomo-checkbox').forEach(checkbox => {
                        checkbox.addEventListener('change', actualizarContadorSeleccionados);
                    });

        async function subirTomo(event) {
            event.preventDefault();
            
            const archivo = document.getElementById('archivoTomo').files[0];
            const nombre = document.getElementById('nombreTomo').value.trim();
            const descripcion = document.getElementById('descripcionTomo').value.trim();
            const errorDiv = document.getElementById('modalTomoError');
            const progresoDiv = document.getElementById('subirProgreso');
            const barraProgreso = document.getElementById('barraProgreso');
            const textoProgreso = document.getElementById('textoProgreso');
            
            errorDiv.innerHTML = '';
            
            if (!archivo) {
                errorDiv.innerHTML = '<div class="error">Debe seleccionar un archivo PDF</div>';
                return;
            }
            
            if (!nombre) {
                errorDiv.innerHTML = '<div class="error">El nombre es requerido</div>';
                return;
            }
            
            // Validar tamaño (500MB max)
            if (archivo.size > 500 * 1024 * 1024) {
                errorDiv.innerHTML = '<div class="error">El archivo es demasiado grande. Máximo 500MB</div>';
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const formData = new FormData();
                formData.append('archivo', archivo);
                formData.append('nombre', nombre);
                formData.append('descripcion', descripcion);
                formData.append('carpeta_id', carpetaActual);

                progresoDiv.style.display = 'block';

                // Usar XMLHttpRequest para monitoreo de progreso
                const xhr = new XMLHttpRequest();
                
                const response = await new Promise((resolve, reject) => {
                    xhr.upload.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const porcentaje = Math.round((event.loaded / event.total) * 100);
                            const cargadoMB = Math.round(event.loaded / (1024 * 1024) * 10) / 10;
                            const totalMB = Math.round(event.total / (1024 * 1024) * 10) / 10;
                            
                            barraProgreso.style.width = porcentaje + '%';
                            textoProgreso.textContent = `Subiendo... ${cargadoMB}MB / ${totalMB}MB (${porcentaje}%)`;
                        }
                    };
                    
                    xhr.onload = () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            const resultado = JSON.parse(xhr.responseText);
                            resolve({
                                ok: true,
                                json: () => Promise.resolve(resultado)
                            });
                        } else {
                            try {
                                const error = JSON.parse(xhr.responseText);
                                reject(new Error(error.detail || 'Error al subir tomo'));
                            } catch {
                                reject(new Error(`Error ${xhr.status}: ${xhr.statusText}`));
                            }
                        }
                    };
                    
                    xhr.onerror = () => reject(new Error('Error de conexión'));
                    xhr.ontimeout = () => reject(new Error('Tiempo de espera agotado'));
                    
                    xhr.open('POST', `${API_URL}/tomos/upload`);
                    xhr.setRequestHeader('Authorization', `Bearer ${token}`);
                    xhr.timeout = 300000; // 5 minutos para archivos grandes
                    xhr.send(formData);
                });

                barraProgreso.style.width = '100%';
                textoProgreso.textContent = 'Completado';
                cerrarModalTomo();
                cargarTomos(carpetaActual);
                
                // Mostrar mensaje de éxito
                const container = document.getElementById('tomosList');
                container.insertAdjacentHTML('afterbegin', 
                    '<div class="success">Tomo subido correctamente</div>'
                );
                
                setTimeout(() => {
                    const successMsg = container.querySelector('.success');
                    if (successMsg) successMsg.remove();
                }, 3000);

            } catch (error) {
                progresoDiv.style.display = 'none';
                errorDiv.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        async function exportarOCRTexto(tomoId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/tomos/${tomoId}/contenido-ocr`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Error al exportar');
                
                const data = await response.json();
                
                // Generar texto
                let textoCompleto = `CONTENIDO OCR - ${data.tomo_nombre}\n`;
                textoCompleto += `${'='.repeat(80)}\n\n`;
                
                data.contenido.forEach(pagina => {
                    textoCompleto += `\n${'─'.repeat(80)}\n`;
                    textoCompleto += `PÁGINA ${pagina.numero_pagina} (Física del PDF)\n`;
                    if (pagina.es_caratula) {

                    textoCompleto += `Confianza: ${(pagina.confianza * 100).toFixed(1)}%\n`;
                    textoCompleto += `${'─'.repeat(80)}\n\n`;
                    textoCompleto += pagina.texto_extraido || '[Sin texto]\n';

                // Descargar

                setTimeout(() => {
                    const successMsg = container.querySelector('.success');
                    if (successMsg) successMsg.remove();
                }, 15000);
                
            } catch (error) {
                hideLoading();
                alert(`Error al analizar con IA: ${error.message}`);
            }
        }

        async function procesarSeleccionados() {
            const checkboxes = document.querySelectorAll('.tomo-checkbox:checked');
            
            if (checkboxes.length === 0) {
                alert('⚠️ Selecciona al menos un tomo para procesar');
                return;
            }
            
            const tomosIds = Array.from(checkboxes).map(cb => parseInt(cb.dataset.tomoId));
            const cantidad = tomosIds.length;
            
            if (!confirm(`¿Deseas procesar el OCR completo para ${cantidad} tomo${cantidad !== 1 ? 's' : ''}?\n\nEsto puede tomar bastante tiempo. Los tomos se procesarán uno por uno.`)) {
                return;
            }
            
            // Deshabilitar botones durante el procesamiento
            const btnProcesar = event.target;
            btnProcesar.disabled = true;
            btnProcesar.textContent = '⏳ Procesando...';
            
            const container = document.getElementById('tomosList');
            let procesados = 0;
            let errores = 0;
            
            // Mostrar barra de progreso
            container.insertAdjacentHTML('afterbegin', 
                `<div id="progresoOCR" class="success" style="position: sticky; top: 0; z-index: 100;">
                    <strong>🔄 Procesando tomos: <span id="progresoActual">0</span>/${cantidad}</strong>
                    <div style="margin-top: 10px; background: #ddd; height: 20px; border-radius: 10px; overflow: hidden;">
                        <div id="barraProgreso" style="background: #007bff; height: 100%; width: 0%; transition: width 0.3s;"></div>
                    </div>
                </div>`
            );
            
            // Procesar cada tomo secuencialmente
            for (let i = 0; i < tomosIds.length; i++) {
                const tomoId = tomosIds[i];
                
                try {
                    // Actualizar progreso
                    document.getElementById('progresoActual').textContent = i + 1;
                    const porcentaje = ((i + 1) / cantidad) * 100;
                    document.getElementById('barraProgreso').style.width = `${porcentaje}%`;
                    
                    const token = localStorage.getItem('token');
                    const response = await fetch(`${API_URL}/admin/tomos/${tomoId}/procesar-ocr-completo`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        procesados++;
                    } else {
                        errores++;
                        console.error(`Error procesando tomo ${tomoId}`);
                    }
                    
                } catch (error) {
                    errores++;
                    console.error(`Error procesando tomo ${tomoId}:`, error);
                }
            }
            
            // Eliminar barra de progreso
            const progreso = document.getElementById('progresoOCR');
            if (progreso) progreso.remove();
            
            // Mostrar resumen
            container.insertAdjacentHTML('afterbegin', 
                `<div class="${errores > 0 ? 'error' : 'success'}">
                    ${errores === 0 ? '✅' : '⚠️'} Procesamiento completado:<br>
                    ✓ ${procesados} tomo${procesados !== 1 ? 's' : ''} procesado${procesados !== 1 ? 's' : ''} correctamente<br>
                    ${errores > 0 ? `✗ ${errores} tomo${errores !== 1 ? 's' : ''} con errores` : ''}
                </div>`
            );
            
            // Recargar lista y limpiar selección
            setTimeout(() => {
                cargarTomos(carpetaActual);
                deseleccionarTodos();
            }, 3000);
            
            // Restaurar botón
            btnProcesar.disabled = false;
            btnProcesar.textContent = '⚙️ Procesar OCR Seleccionados';
            
            // Eliminar mensaje después de 10 segundos
            setTimeout(() => {
                const successMsg = container.querySelector('.success, .error');
                if (successMsg && !successMsg.id) successMsg.remove();
            }, 10000);
        }

        // Cerrar modales con ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                cerrarModalCarpeta();
                cerrarModalTomo();
            }
        });
    </script>
</body>
