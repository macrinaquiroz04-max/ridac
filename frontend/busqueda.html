<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Búsqueda - Sistema OCR FGJCDMX</title>
    <link rel="stylesheet" href="css/sistema.css">
    <style>
        .search-container {
            background: var(--white);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 25px;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }
        
        .results-container {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        
        .result-item {
            padding: 25px;
            border-bottom: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .result-item:hover {
            background: var(--light-bg);
            transform: translateX(5px);
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-title {
            color: var(--primary-color);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .result-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .result-snippet {
            color: var(--dark-color);
            line-height: 1.6;
        }
        
        .highlight {
            background: linear-gradient(135deg, var(--warning-color), #ffb347);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔎 Búsqueda en Documentos</h1>
        <div class="user-info">
            <span id="userName">Cargando...</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>🔎 Buscar en Expedientes</h2>
            
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar por número de expediente, descripción..." onkeyup="filtrarTomos()">
            </div>
            
            <div class="results-container" id="tomosContainer">
                <div style="padding: 30px; text-align: center; color: #666;">
                    Cargando expedientes...
                </div>
            </div>
            
            <button class="btn-secondary" onclick="location.href='dashboard'">← Volver al Dashboard</button>
        </div>
    </div>

    <script>
        // Detectar automáticamente la URL base
        const isNginx = window.location.port === '' || window.location.port === '80';
        const API_URL = isNginx 
            ? `${window.location.protocol}//${window.location.hostname}/api`
            : `${window.location.protocol}//${window.location.hostname}:8000/api`;
        
        (() => {})('Modo:', isNginx ? 'Nginx Proxy' : 'Backend Directo');
        (() => {})('API URL:', API_URL);
        (() => {})('🌐 API URL (Búsqueda):', API_URL);
        let todosLosTomos = [];

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Token inválido');
                }

                const user = await response.json();
                document.getElementById('userName').textContent = `${user.username} (${user.rol})`;
                
                cargarTomos();
            } catch (error) {
                localStorage.clear();
                window.location.href = 'index';
            }
        }

        async function cargarTomos() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/analisis/tomos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    todosLosTomos = await response.json();
                    mostrarTomos(todosLosTomos);
                } else {
                    document.getElementById('tomosContainer').innerHTML = '<div style="padding: 30px; text-align: center; color: #dc3545;">Error al cargar expedientes</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tomosContainer').innerHTML = '<div style="padding: 30px; text-align: center; color: #dc3545;">Error de conexión</div>';
            }
        }

        function mostrarTomos(tomos) {
            const container = document.getElementById('tomosContainer');
            
            if (tomos.length === 0) {
                container.innerHTML = '<div style="padding: 30px; text-align: center; color: #666;">No se encontraron expedientes</div>';
                return;
            }

            container.innerHTML = tomos.map(tomo => `
                <div class="result-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 style="color: var(--primary-color); margin-bottom: 10px;">
                                📁 ${tomo.numero || 'Sin número'}
                            </h3>
                            <p style="color: #666; margin-bottom: 10px;">
                                ${tomo.descripcion || 'Sin descripción'}
                            </p>
                            <small style="color: #999;">
                                Subido: ${new Date(tomo.fecha_subida).toLocaleDateString('es-ES')}
                            </small>
                        </div>
                        <button class="btn-primary" onclick="mostrarOpcionesVisualizacion(${tomo.id})" style="min-width: 120px;">
                            🔍 REVISAR
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filtrarTomos() {
            const filtro = document.getElementById('searchInput').value.toLowerCase();
            const tomosFiltrados = todosLosTomos.filter(tomo => 
                (tomo.numero && tomo.numero.toLowerCase().includes(filtro)) ||
                (tomo.descripcion && tomo.descripcion.toLowerCase().includes(filtro))
            );
            mostrarTomos(tomosFiltrados);
        }

        function mostrarOpcionesVisualizacion(tomoId) {
            const token = localStorage.getItem('token');
            const pdfUrl = `/api/tomos/${tomoId}/pdf?auth_token=${encodeURIComponent(token)}`;
            const ocrUrl = `/api/tomos/${tomoId}/texto-buscable?auth_token=${encodeURIComponent(token)}`;
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.9); z-index: 10000;
                display: flex; align-items: center; justify-content: center;
            `;
            
            modal.innerHTML = `
                <div style="
                    background: white; padding: 40px; border-radius: 15px;
                    max-width: 600px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                ">
                    <h2 style="color: #333; margin-bottom: 20px;">� ¿Cómo quieres ver el expediente?</h2>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
                        
                        <div style="
                            border: 2px solid #007bff; border-radius: 12px; padding: 25px;
                            cursor: pointer; transition: all 0.3s;
                        " onclick="abrirPDFOriginal('${pdfUrl}'); this.remove();">
                            <div style="font-size: 48px; margin-bottom: 15px;">📄</div>
                            <h3 style="color: #007bff; margin-bottom: 10px;">PDF Original</h3>
                            <p style="color: #666; font-size: 14px;">
                                Documento exacto escaneado
                                <br><strong>⚠️ Búsqueda limitada</strong>
                            </p>
                        </div>
                        
                        <div style="
                            border: 2px solid #28a745; border-radius: 12px; padding: 25px;
                            cursor: pointer; transition: all 0.3s; background: #f8fff8;
                        " onclick="abrirTextoOCR('${ocrUrl}'); this.remove();">
                            <div style="font-size: 48px; margin-bottom: 15px;">🔍</div>
                            <h3 style="color: #28a745; margin-bottom: 10px;">Texto Buscable</h3>
                            <p style="color: #666; font-size: 14px;">
                                Contenido extraído con OCR
                                <br><strong>✅ Búsqueda completa</strong>
                            </p>
                        </div>
                    </div>
                    
                    <button onclick="this.parentElement.parentElement.remove()" style="
                        background: #6c757d; color: white; border: none; 
                        padding: 10px 20px; border-radius: 5px; cursor: pointer;
                    ">Cancelar</button>
                </div>
            `;
            
            document.body.appendChild(modal);
        }

        function abrirPDFOriginal(pdfUrl) {
            window.open(pdfUrl, 'expediente_original', 'width=1400,height=900,scrollbars=yes,resizable=yes');
        }

        function abrirTextoOCR(ocrUrl) {
            window.open(ocrUrl, 'expediente_ocr', 'width=1400,height=900,scrollbars=yes,resizable=yes');
        }

        function logout() {
            if (confirm('¿Seguro que deseas cerrar sesión?')) {
                localStorage.clear();
                window.location.href = 'index';
            }
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
