<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#23527c" stroke="#1a4068" stroke-width="4"/>
  
  <!-- Balanza de justicia -->
  <g transform="translate(100, 100)">
    <!-- Base -->
    <rect x="-3" y="30" width="6" height="40" fill="#ffd700"/>
    <rect x="-25" y="68" width="50" height="8" rx="4" fill="#ffd700"/>
    
    <!-- Poste central -->
    <rect x="-2" y="-50" width="4" height="80" fill="#ffd700"/>
    
    <!-- Brazo horizontal -->
    <rect x="-40" y="-52" width="80" height="4" fill="#ffd700"/>
    
    <!-- Platos izquierdo -->
    <circle cx="-35" cy="-40" r="12" fill="none" stroke="#ffd700" stroke-width="2"/>
    <path d="M -47 -40 Q -35 -48 -23 -40" fill="none" stroke="#ffd700" stroke-width="2"/>
    <path d="M -35 -52 L -35 -40" stroke="#ffd700" stroke-width="1"/>
    
    <!-- Platos derecho -->
    <circle cx="35" cy="-40" r="12" fill="none" stroke="#ffd700" stroke-width="2"/>
    <path d="M 23 -40 Q 35 -48 47 -40" fill="none" stroke="#ffd700" stroke-width="2"/>
    <path d="M 35 -52 L 35 -40" stroke="#ffd700" stroke-width="1"/>
  </g>
  
  <!-- Texto FGJCDMX -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">FGJCDMX</text>
</svg>