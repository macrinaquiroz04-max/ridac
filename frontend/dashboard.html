<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Dashboard - Sistema OCR FGJCDMX</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2c5aa0;
            --accent-color: #dc3545;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --dark-color: #2c3e50;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --border-radius: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--light-bg) 0%, #e9ecef 100%); 
            min-height: 100vh;
        }
        
        .header { 
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white; 
            padding: 20px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            pointer-events: none;
        }
        
        .header h1 { 
            font-size: 28px; 
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .header .user-info { 
            display: flex; 
            align-items: center; 
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header .user-info span {
            font-weight: 500;
            font-size: 16px;
        }
        
        .btn-logout { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            padding: 12px 20px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 25px; 
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn-logout:hover { 
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }
        
        .container { 
            max-width: 1400px; 
            margin: 40px auto; 
            padding: 0 30px; 
        }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-bottom: 40px; 
        }
        
        .stat-card { 
            background: var(--white);
            padding: 30px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .stat-card h3 { 
            color: var(--dark-color); 
            font-size: 16px; 
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .stat-card .value { 
            font-size: 42px; 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card { 
            background: var(--white);
            padding: 35px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .card h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            margin: 8px; 
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.3);
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 90, 160, 0.4);
        }
        
        .btn-secondary { 
            background: linear-gradient(135deg, var(--dark-color), #34495e);
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            margin: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
        }
        
        .btn-secondary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
        }
        
        #systemStatus {
            color: var(--success-color);
            font-weight: 600;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center;">
            <img src="images/fiscalia.png" alt="Fiscalía CDMX" style="width: 40px; height: 40px; object-fit: contain; margin-right: 15px;">
            <h1>Sistema OCR - FGJCDMX</h1>
        </div>
        <div class="user-info">
            <span id="userName">Cargando...</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>📁 Carpetas Totales</h3>
                <div class="value" id="totalCarpetas">0</div>
            </div>
            <div class="stat-card">
                <h3>📄 Tomos Procesados</h3>
                <div class="value" id="totalTomos">0</div>
            </div>
            <div class="stat-card">
                <h3>✅ OCR Completado</h3>
                <div class="value" id="ocrCompletado">0</div>
            </div>
            <div class="stat-card">
                <h3>⏳ OCR Pendiente</h3>
                <div class="value" id="ocrPendiente">0</div>
            </div>
        </div>

        <div class="card">
            <h2>🚀 Acciones Rápidas</h2>
            <button class="btn-primary" onclick="location.href='carpetas'">📁 Gestionar Carpetas</button>
            <button class="btn-secondary" onclick="location.href='usuarios'" id="btnUsuarios" style="display:none;">👥 Gestionar Usuarios</button>
            <button class="btn-secondary" onclick="location.href='monitor-ocr'">📊 Monitor OCR</button>
            <button class="btn-secondary" onclick="location.href='progress-monitor'" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <i class="bi bi-activity"></i> Progreso en Tiempo Real
            </button>
            <button class="btn-secondary" onclick="location.href='auditoria'" style="display:none; background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);" id="btnAuditoria">🔍 Auditoría</button>
            <button class="btn-secondary" onclick="location.href='correccion-diligencias'" style="background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">✏️ Corregir Diligencias</button>
            <button class="btn-secondary" onclick="location.href='limpieza-personas'" id="btnLimpiezaPersonas" style="display:none; background: linear-gradient(135deg, #fd7e14 0%, #e8590c 100%);">👥 Limpiar Personas</button>
            <!-- Autocorrector eliminado - ahora es automático durante procesamiento OCR -->
        </div>

        <div class="card">
            <h2>📊 Estado del Sistema</h2>
            <p id="systemStatus">Cargando...</p>
        </div>
    </div>

    <script>
        // Detectar automáticamente la URL base del API
        // Si estamos en nginx (puerto 80), usar el proxy /api
        // Si estamos en backend directo (puerto 8000), usar puerto 8000
        const isNginx = window.location.port === '' || window.location.port === '80';
        const API_URL = isNginx 
            ? `${window.location.protocol}//${window.location.hostname}/api`
            : `${window.location.protocol}//${window.location.hostname}:8000/api`;
        
        console.log('🌐 Modo:', isNginx ? 'Nginx Proxy' : 'Backend Directo');
        console.log('🌐 API URL (Dashboard):', API_URL);

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                console.log('❌ No hay token, redirigiendo a login...');
                window.location.href = '/index';
                return;
            }

            try {
                console.log('🔐 Verificando autenticación...');
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Token inválido');
                }

                const data = await response.json();
                const user = data;

                console.log('✅ Usuario autenticado:', user.username);
                document.getElementById('userName').textContent = `${user.username} (${user.rol})`;

                // Cargar foto de perfil si existe
                const profileImg = document.getElementById('profileImg');
                if (user.foto_perfil && profileImg) {
                    profileImg.src = `${API_URL}/usuarios/profile-image/${user.id}`;
                    profileImg.onerror = function() {
                        this.src = 'images/default-avatar.svg';
                    };
                } else if (profileImg) {
                    profileImg.src = 'images/default-avatar.svg';
                }

                // Mostrar botón de usuarios solo para admin
                if (user.rol === 'admin') {
                    document.getElementById('btnUsuarios').style.display = 'inline-block';
                    document.getElementById('btnLimpiezaPersonas').style.display = 'inline-block';
                    document.getElementById('btnAuditoria').style.display = 'inline-block';
                }

                loadStats();
            } catch (error) {
                console.error('❌ Error en autenticación:', error);
                alert('Sesión expirada. Por favor inicia sesión nuevamente.');
                localStorage.clear();
                window.location.href = '/index';
            }
        }

        let autoRefreshInterval = null;
        
        async function loadStats() {
            const token = localStorage.getItem('token');
            console.log('═══════════════════════════════════════════');
            console.log('📊 CARGANDO ESTADÍSTICAS');
            console.log('═══════════════════════════════════════════');
            console.log('🕐 Hora:', new Date().toLocaleTimeString());
            console.log('🔗 API URL:', API_URL);
            console.log('🔑 Token:', token ? 'Presente' : 'AUSENTE');
            
            try {
                // Obtener estadísticas de carpetas
                console.log('📡 Solicitando carpetas desde:', `${API_URL}/carpetas`);
                const carpetasResponse = await fetch(`${API_URL}/carpetas`, {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('📥 Response carpetas:', {
                    status: carpetasResponse.status,
                    ok: carpetasResponse.ok,
                    statusText: carpetasResponse.statusText,
                    headers: Object.fromEntries(carpetasResponse.headers.entries())
                });
                
                if (carpetasResponse.ok) {
                    const carpetas = await carpetasResponse.json();
                    console.log('✅ Carpetas cargadas:', carpetas.length);
                    console.log('📋 Detalle carpetas:', carpetas.map(c => ({
                        id: c.id,
                        numero: c.numero_carpeta,
                        total_tomos: c.total_tomos
                    })));
                    
                    document.getElementById('totalCarpetas').textContent = carpetas.length;
                    
                    // Contar tomos totales (viene en cada carpeta como total_tomos)
                    let totalTomos = 0;
                    for (const carpeta of carpetas) {
                        totalTomos += carpeta.total_tomos || 0;
                    }
                    console.log('📚 Total tomos calculados:', totalTomos);
                    document.getElementById('totalTomos').textContent = totalTomos;
                    
                    // Obtener estadísticas de OCR desde el endpoint de estadísticas
                    let ocrCompletado = 0;
                    let ocrPendiente = 0;
                    let hayProcesosActivos = false;
                    
                    console.log('───────────────────────────────────────────');
                    console.log('🔍 ANALIZANDO TOMOS POR CARPETA');
                    console.log('───────────────────────────────────────────');
                    
                    for (const carpeta of carpetas) {
                        try {
                            console.log(`📂 Carpeta ${carpeta.id} (${carpeta.numero_carpeta}):`);
                            const tomosUrl = `${API_URL}/tomos/${carpeta.id}`;
                            console.log(`   🔗 Solicitando: ${tomosUrl}`);
                            
                            const tomosResponse = await fetch(tomosUrl, {
                                headers: { 'Authorization': `Bearer ${token}` }
                            });
                            
                            console.log(`   📥 Response:`, {
                                status: tomosResponse.status,
                                ok: tomosResponse.ok
                            });
                            
                            if (tomosResponse.ok) {
                                const tomos = await tomosResponse.json();
                                console.log(`   ✅ ${tomos.length} tomos encontrados`);
                                
                                for (const tomo of tomos) {
                                    console.log(`      📄 Tomo ${tomo.id}:`, {
                                        numero: tomo.numero_tomo,
                                        estado: tomo.estado,
                                        paginas: tomo.numero_paginas,
                                        fecha_procesamiento: tomo.fecha_procesamiento
                                    });
                                    
                                    // Verificar si hay procesos OCR activos
                                    if (tomo.estado === 'procesando') {
                                        hayProcesosActivos = true;
                                        console.log(`      🔄 PROCESO ACTIVO detectado en tomo ${tomo.id}`);
                                    }
                                    
                                    // Verificar si el OCR está completado al 100%
                                    // Solo se considera completado si tiene estado "completado" Y fecha_procesamiento
                                    if (tomo.estado === 'completado' && tomo.fecha_procesamiento) {
                                        ocrCompletado++;
                                        console.log(`      ✅ OCR Completado (tomo ${tomo.id})`);
                                    } else {
                                        ocrPendiente++;
                                        console.log(`      ⏳ OCR Pendiente (tomo ${tomo.id})`);
                                    }
                                }
                            } else {
                                console.warn(`   ⚠️ Error obteniendo tomos: ${tomosResponse.status}`);
                            }
                        } catch (err) {
                            console.error(`   ❌ Error obteniendo tomos de carpeta ${carpeta.id}:`, err);
                        }
                    }
                    
                    console.log('───────────────────────────────────────────');
                    console.log('📊 RESUMEN DE ESTADÍSTICAS OCR:');
                    console.log('───────────────────────────────────────────');
                    console.log('   ✅ OCR Completado:', ocrCompletado);
                    console.log('   ⏳ OCR Pendiente:', ocrPendiente);
                    console.log('   🔄 Hay procesos activos:', hayProcesosActivos);
                    
                    document.getElementById('ocrCompletado').textContent = ocrCompletado;
                    document.getElementById('ocrPendiente').textContent = ocrPendiente;
                    
                    // Configurar auto-refresh si hay procesos activos
                    if (hayProcesosActivos) {
                        const mensaje = '🔄 Procesando OCR... (actualizando cada 30s)';
                        document.getElementById('systemStatus').textContent = mensaje;
                        console.log('🔄 Auto-refresh ACTIVADO (hay procesos activos)');
                        if (!autoRefreshInterval) {
                            autoRefreshInterval = setInterval(loadStats, 30000); // 30 segundos
                            console.log('⏰ Intervalo de auto-refresh iniciado');
                        }
                    } else {
                        const mensaje = '✓ Sistema funcionando correctamente';
                        document.getElementById('systemStatus').textContent = mensaje;
                        console.log('✓ Auto-refresh DESACTIVADO (no hay procesos activos)');
                        if (autoRefreshInterval) {
                            clearInterval(autoRefreshInterval);
                            autoRefreshInterval = null;
                            console.log('⏰ Intervalo de auto-refresh detenido');
                        }
                    }
                    
                    console.log('═══════════════════════════════════════════');
                    console.log('✅ CARGA DE ESTADÍSTICAS COMPLETADA');
                    console.log('═══════════════════════════════════════════');
                } else {
                    console.error('❌ Error al cargar carpetas:', carpetasResponse.status);
                    document.getElementById('systemStatus').textContent = '⚠️ Error al cargar estadísticas';
                    document.getElementById('totalCarpetas').textContent = '-';
                    document.getElementById('totalTomos').textContent = '-';
                    document.getElementById('ocrCompletado').textContent = '-';
                    document.getElementById('ocrPendiente').textContent = '-';
                }
            } catch (error) {
                console.error('═══════════════════════════════════════════');
                console.error('❌ ERROR FATAL CARGANDO ESTADÍSTICAS');
                console.error('═══════════════════════════════════════════');
                console.error('Error:', error);
                console.error('Stack:', error.stack);
                document.getElementById('systemStatus').textContent = '⚠️ Error de conexión con el servidor';
                document.getElementById('totalCarpetas').textContent = '-';
                document.getElementById('totalTomos').textContent = '-';
                document.getElementById('ocrCompletado').textContent = '-';
                document.getElementById('ocrPendiente').textContent = '-';
            }
        }

        function logout() {
            if (confirm('¿Seguro que deseas cerrar sesión?')) {
                console.log('👋 Cerrando sesión...');
                localStorage.clear();
                window.location.href = '/index';
            }
        }

        // Iniciar cuando cargue la página
        window.onload = () => {
            console.clear(); // Limpiar consola para mejor legibilidad
            console.log('╔═══════════════════════════════════════════╗');
            console.log('║   🚀 DASHBOARD INICIANDO                  ║');
            console.log('╚═══════════════════════════════════════════╝');
            console.log('🕐 Timestamp:', new Date().toLocaleString());
            console.log('🌐 Location:', window.location.href);
            console.log('🔌 Puerto:', window.location.port || '80 (default)');
            console.log('🔧 Modo detectado:', isNginx ? 'NGINX PROXY' : 'BACKEND DIRECTO');
            console.log('🔗 API URL configurada:', API_URL);
            console.log('');
            checkAuth();
        };
    </script>
</body>
</html>
