<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpieza de Personas - FGJCDMX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #003d82;
            --secondary-gold: #d4af37;
            --danger-red: #dc3545;
            --success-green: #198754;
            --warning-yellow: #ffc107;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-blue), #0052ad);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-persona {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .card-persona:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .badge-problema {
            font-size: 0.75rem;
            padding: 4px 8px;
        }

        .btn-action {
            margin-left: 5px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .checkbox-select {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .persona-invalida {
            border-left: 4px solid var(--danger-red);
        }

        .persona-concepto {
            border-left: 4px solid var(--warning-yellow);
        }

        .persona-fragmento {
            border-left: 4px solid #6c757d;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-light" style="width: 3rem; height: 3rem;"></div>
    </div>

    <div class="container-main">
        <!-- Header -->
        <div class="header-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1><i class="fas fa-user-slash text-danger"></i> Limpieza de Personas</h1>
                    <p class="text-muted mb-0">Elimina conceptos, lugares y fragmentos OCR mal detectados como personas</p>
                </div>
                <div>
                    <button class="btn btn-outline-secondary" onclick="window.location.href='dashboard'">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                </div>
            </div>

            <!-- Estadísticas -->
            <div class="row g-3">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="totalProblemas">0</div>
                        <div class="text-muted">Personas Inválidas</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #dc3545, #c82333);">
                        <div class="stat-number" id="conceptosLegales">0</div>
                        <div class="text-muted">Conceptos Legales</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #ffc107, #e0a800);">
                        <div class="stat-number" id="lugaresDetectados">0</div>
                        <div class="text-muted">Lugares</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card" style="background: linear-gradient(135deg, #6c757d, #5a6268);">
                        <div class="stat-number" id="fragmentosOCR">0</div>
                        <div class="text-muted">Fragmentos OCR</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Acciones Masivas -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label"><i class="fas fa-filter"></i> Tipo de Problema</label>
                        <select class="form-select" id="filtroTipoProblema">
                            <option value="">Todos los problemas</option>
                            <option value="nombres_invalidos">Conceptos Legales</option>
                            <option value="conceptos">Lugares y Fragmentos</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="cargarProblemas()">
                            <i class="fas fa-search"></i> Buscar
                        </button>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-warning w-100" onclick="eliminarSeleccionados()">
                            <i class="fas fa-trash-alt"></i> Eliminar Seleccionados
                        </button>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-danger w-100" onclick="limpiezaAutomatica()">
                            <i class="fas fa-magic"></i> Limpieza Automática
                        </button>
                    </div>
                </div>
                <div class="mt-3">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i>
                        <strong>Limpieza Automática</strong> eliminará: conceptos legales, lugares, fragmentos OCR y nombres muy cortos (< 6 caracteres)
                    </small>
                </div>
            </div>
        </div>

        <!-- Controles de Selección -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <input type="checkbox" id="selectAll" class="checkbox-select me-2" onchange="toggleSelectAll()">
                        <label for="selectAll" class="mb-0">Seleccionar/Deseleccionar Todos</label>
                    </div>
                    <div>
                        <span id="contadorSeleccionados" class="badge bg-info">0 seleccionados</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lista de Problemas -->
        <div id="listaProblemas"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let personasSeleccionadas = new Set();

        function getAuthHeaders() {
            // Intentar ambas formas de almacenar el token
            const token = localStorage.getItem('access_token') || localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function escaparHTML(texto) {
            if (!texto) return '';
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        async function cargarProblemas() {
            try {
                showLoading();

                // DEBUG: Verificar token
                const token = localStorage.getItem('access_token') || localStorage.getItem('token');
                console.log('🔑 Token presente:', !!token);
                if (!token) {
                    alert('⚠️ No hay sesión activa. Redirigiendo al login...');
                    window.location.href = 'index';
                    return;
                }

                const tipoProblema = document.getElementById('filtroTipoProblema').value;
                const params = new URLSearchParams();
                
                if (tipoProblema) params.append('tipo_problema', tipoProblema);
                params.append('limite', '200');

                const response = await fetch(`${API_URL}/admin/personas/problematicas?${params}`, {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    if (response.status === 403) {
                        alert('❌ Acceso Denegado\n\nEste usuario NO tiene permisos de administrador.\n\nSolo los administradores pueden limpiar personas.\n\nContacta al administrador del sistema.');
                        window.location.href = 'dashboard';
                        return;
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                mostrarProblemas(data.problemas || []);
                actualizarEstadisticas(data.problemas || []);

                hideLoading();
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                alert('Error al cargar problemas: ' + error.message);
            }
        }

        function mostrarProblemas(problemas) {
            const container = document.getElementById('listaProblemas');

            if (!problemas || problemas.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="card-body text-center py-5">
                            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                            <h4>¡No hay personas inválidas detectadas!</h4>
                            <p class="text-muted">Todas las personas parecen válidas.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = problemas.map(p => `
                <div class="card-persona ${getClaseProblema(p.tipo_problema)}">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <input type="checkbox" 
                                   class="checkbox-select" 
                                   id="check_${p.id}" 
                                   onchange="toggleSeleccion(${p.id})">
                        </div>
                        <div class="col-md-1 text-center">
                            <strong>#${p.id}</strong>
                        </div>
                        <div class="col-md-4">
                            <strong>${escaparHTML(p.nombre_completo)}</strong>
                            <br>
                            <span class="badge ${getBadgeClass(p.tipo_problema)}">
                                ${getTipoProblemaLabel(p.tipo_problema)}
                            </span>
                        </div>
                        <div class="col-md-2">
                            ${p.rol ? `<small><i class="fas fa-user-tag"></i> ${escaparHTML(p.rol)}</small>` : '<em class="text-muted">Sin rol</em>'}
                        </div>
                        <div class="col-md-3">
                            <small class="text-muted">
                                <i class="fas fa-exclamation-triangle text-warning"></i>
                                ${escaparHTML(p.descripcion_problema)}
                            </small>
                        </div>
                        <div class="col-md-2 text-end">
                            <button class="btn btn-sm btn-danger btn-action" onclick="eliminarPersona(${p.id}, '${escaparHTML(p.nombre_completo)}')">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function actualizarEstadisticas(problemas) {
            const stats = {
                total: problemas.length,
                conceptos: problemas.filter(p => p.tipo_problema === 'concepto_legal').length,
                lugares: problemas.filter(p => p.tipo_problema === 'lugar').length,
                fragmentos: problemas.filter(p => p.tipo_problema === 'fragmento' || p.tipo_problema === 'nombre_corto').length
            };

            document.getElementById('totalProblemas').textContent = stats.total;
            document.getElementById('conceptosLegales').textContent = stats.conceptos;
            document.getElementById('lugaresDetectados').textContent = stats.lugares;
            document.getElementById('fragmentosOCR').textContent = stats.fragmentos;
        }

        function toggleSeleccion(id) {
            if (personasSeleccionadas.has(id)) {
                personasSeleccionadas.delete(id);
            } else {
                personasSeleccionadas.add(id);
            }
            actualizarContadorSeleccionados();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            const checkboxes = document.querySelectorAll('.checkbox-select:not(#selectAll)');
            
            personasSeleccionadas.clear();
            
            checkboxes.forEach(cb => {
                cb.checked = selectAll;
                if (selectAll) {
                    const id = parseInt(cb.id.replace('check_', ''));
                    personasSeleccionadas.add(id);
                }
            });
            
            actualizarContadorSeleccionados();
        }

        function actualizarContadorSeleccionados() {
            document.getElementById('contadorSeleccionados').textContent = 
                `${personasSeleccionadas.size} seleccionados`;
        }

        async function eliminarPersona(id, nombre) {
            if (!confirm(`¿Eliminar persona inválida?\n\n"${nombre}"\n\nEsta acción no se puede deshacer.`)) {
                return;
            }

            try {
                showLoading();

                const response = await fetch(`${API_URL}/admin/personas/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ Persona eliminada correctamente');
                    cargarProblemas();
                } else {
                    alert('❌ Error al eliminar');
                }

                hideLoading();
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                alert('❌ Error al eliminar persona');
            }
        }

        async function eliminarSeleccionados() {
            if (personasSeleccionadas.size === 0) {
                alert('⚠️ No has seleccionado ninguna persona');
                return;
            }

            if (!confirm(`¿Eliminar ${personasSeleccionadas.size} personas seleccionadas?\n\nEsta acción no se puede deshacer.`)) {
                return;
            }

            try {
                showLoading();

                const response = await fetch(`${API_URL}/admin/personas/eliminar-masivo`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(Array.from(personasSeleccionadas))
                });

                const result = await response.json();

                if (result.success) {
                    alert(`✅ ${result.total_eliminadas} personas eliminadas correctamente`);
                    personasSeleccionadas.clear();
                    cargarProblemas();
                } else {
                    alert('❌ Error al eliminar');
                }

                hideLoading();
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                alert('❌ Error al eliminar personas');
            }
        }

        async function limpiezaAutomatica() {
            if (!confirm('🧹 LIMPIEZA AUTOMÁTICA\n\nEsto eliminará automáticamente:\n\n• Conceptos legales (Mecanismo Ciudadano, Abuso Sexual, etc.)\n• Lugares (Ciudad De, San Luis, etc.)\n• Fragmentos OCR (Dal Ce, Saa Ne, etc.)\n• Nombres muy cortos (< 6 caracteres)\n\n¿Continuar?')) {
                return;
            }

            try {
                showLoading();

                const response = await fetch(`${API_URL}/admin/personas/limpiar-automatico`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });

                const result = await response.json();

                if (result.success) {
                    let mensaje = `✅ Limpieza automática completada\n\n`;
                    mensaje += `Total eliminadas: ${result.total_eliminadas}\n\n`;
                    
                    if (result.ejemplos && result.ejemplos.length > 0) {
                        mensaje += `Ejemplos eliminados:\n${result.ejemplos.slice(0, 10).join('\n')}`;
                        if (result.ejemplos.length > 10) {
                            mensaje += `\n... y ${result.ejemplos.length - 10} más`;
                        }
                    }

                    alert(mensaje);
                    cargarProblemas();
                } else {
                    alert('❌ Error en limpieza automática');
                }

                hideLoading();
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                alert('❌ Error en limpieza automática');
            }
        }

        function getClaseProblema(tipo) {
            const clases = {
                'concepto_legal': 'persona-invalida',
                'lugar': 'persona-concepto',
                'fragmento': 'persona-fragmento',
                'nombre_corto': 'persona-fragmento',
                'con_numeros': 'persona-fragmento'
            };
            return clases[tipo] || '';
        }

        function getBadgeClass(tipo) {
            const classes = {
                'concepto_legal': 'bg-danger',
                'lugar': 'bg-warning',
                'fragmento': 'bg-secondary',
                'nombre_corto': 'bg-secondary',
                'con_numeros': 'bg-info'
            };
            return classes[tipo] || 'bg-secondary';
        }

        function getTipoProblemaLabel(tipo) {
            const labels = {
                'concepto_legal': 'Concepto Legal',
                'lugar': 'Lugar',
                'fragmento': 'Fragmento OCR',
                'nombre_corto': 'Nombre Corto',
                'con_numeros': 'Con Números'
            };
            return labels[tipo] || tipo;
        }

        // Cargar al inicio
        document.addEventListener('DOMContentLoaded', () => {
            cargarProblemas();
        });
    </script>
</body>
</html>
