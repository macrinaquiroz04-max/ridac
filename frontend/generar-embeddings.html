<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>Generador de Embeddings - Sistema OCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-generar {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-generar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .progress-container {
            display: none;
        }
        .log-container {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="fas fa-brain me-2"></i>Generador de Embeddings</h3>
                        <p class="mb-0">Procesar documentos para búsqueda semántica con IA</p>
                    </div>
                    <div class="card-body">
                        <!-- Opciones -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Carpeta (opcional):</label>
                                <select id="carpetaSelect" class="form-select">
                                    <option value="">Todas las carpetas</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Opciones:</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="forzarRegenerar">
                                    <label class="form-check-label" for="forzarRegenerar">
                                        Regenerar embeddings existentes
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Botón principal -->
                        <div class="text-center mb-4">
                            <button id="btnGenerar" class="btn btn-generar btn-lg text-white">
                                <i class="fas fa-magic me-2"></i>Generar Embeddings
                            </button>
                        </div>

                        <!-- Progreso -->
                        <div id="progressContainer" class="progress-container mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span>Procesando documentos...</span>
                                <span id="progressText">0%</span>
                            </div>
                            <div class="progress">
                                <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Estadísticas -->
                        <div id="statsContainer" style="display: none;">
                            <div class="row text-center mb-4">
                                <div class="col-md-3">
                                    <div class="card bg-primary text-white">
                                        <div class="card-body">
                                            <h4 id="totalDocs">0</h4>
                                            <small>Total</small>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card bg-success text-white">
                                        <div class="card-body">
                                            <h4 id="procesados">0</h4>
                                            <small>Procesados</small>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card bg-danger text-white">
                                        <div class="card-body">
                                            <h4 id="errores">0</h4>
                                            <small>Errores</small>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card bg-info text-white">
                                        <div class="card-body">
                                            <h4 id="porcentaje">0%</h4>
                                            <small>Completado</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Log de resultados -->
                        <div id="logContainer" class="log-container" style="display: none;">
                            <h5><i class="fas fa-file-alt me-2"></i>Log de procesamiento:</h5>
                            <div id="logContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Verificar autenticación
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/index';
        }

        // Cargar carpetas
        async function cargarCarpetas() {
            try {
                const response = await fetch('/api/carpetas', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const carpetas = await response.json();
                    const select = document.getElementById('carpetaSelect');
                    
                    carpetas.forEach(carpeta => {
                        const option = document.createElement('option');
                        option.value = carpeta.id;
                        option.textContent = carpeta.nombre;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error cargando carpetas:', error);
            }
        }

        // Generar embeddings
        async function generarEmbeddings() {
            const btnGenerar = document.getElementById('btnGenerar');
            const progressContainer = document.getElementById('progressContainer');
            const statsContainer = document.getElementById('statsContainer');
            const logContainer = document.getElementById('logContainer');
            const logContent = document.getElementById('logContent');
            
            const carpetaId = document.getElementById('carpetaSelect').value;
            const forzar = document.getElementById('forzarRegenerar').checked;

            // UI inicial
            btnGenerar.disabled = true;
            btnGenerar.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Procesando...';
            progressContainer.style.display = 'block';
            statsContainer.style.display = 'none';
            logContainer.style.display = 'none';
            logContent.innerHTML = '';

            try {
                const params = new URLSearchParams();
                if (carpetaId) params.append('carpeta_id', carpetaId);
                if (forzar) params.append('forzar', 'true');

                const response = await fetch(`/api/admin/generar-embeddings?${params}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Mostrar estadísticas
                    document.getElementById('totalDocs').textContent = result.total || 0;
                    document.getElementById('procesados').textContent = result.procesados || 0;
                    document.getElementById('errores').textContent = result.errores || 0;
                    
                    const porcentaje = result.total > 0 ? Math.round((result.procesados / result.total) * 100) : 0;
                    document.getElementById('porcentaje').textContent = porcentaje + '%';
                    
                    // Progreso
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressText').textContent = '100%';
                    
                    // Log
                    logContent.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ Completado:</strong> ${result.message}
                        </div>
                    `;
                    
                    statsContainer.style.display = 'block';
                    logContainer.style.display = 'block';
                    
                    mostrarNotificacion('Embeddings generados correctamente', 'success');
                } else {
                    throw new Error(result.detail || result.message || 'Error desconocido');
                }

            } catch (error) {
                console.error('Error:', error);
                logContent.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>❌ Error:</strong> ${error.message}
                    </div>
                `;
                logContainer.style.display = 'block';
                mostrarNotificacion('Error generando embeddings: ' + error.message, 'error');
            } finally {
                // Restaurar botón
                btnGenerar.disabled = false;
                btnGenerar.innerHTML = '<i class="fas fa-magic me-2"></i>Generar Embeddings';
                progressContainer.style.display = 'none';
            }
        }

        function mostrarNotificacion(mensaje, tipo) {
            const alertClass = tipo === 'success' ? 'alert-success' : 'alert-danger';
            const icon = tipo === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-triangle';
            
            const notification = document.createElement('div');
            notification.className = `alert ${alertClass} alert-dismissible fade show position-fixed`;
            notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
            notification.innerHTML = `
                <i class="${icon} me-2"></i>${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 5000);
        }

        // Event listeners
        document.getElementById('btnGenerar').addEventListener('click', generarEmbeddings);

        // Cargar datos iniciales
        cargarCarpetas();
    </script>
</body>
</html>
