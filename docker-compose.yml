# Sistema OCR con Análisis Jurídico - Docker Compose
# Desarrollador: Eduardo Lozada Quiroz, ISC
# Cliente: Unidad de Análisis y Contexto (UAyC) - FGJCDMX
# Año: 2025 - Todos los derechos reservados
# Firma: ELQ_ISC_UAYC_2025

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    pull_policy: never  # No descargar de internet, solo usar imagen local
    container_name: sistema_ocr_db
    restart: always  # SIEMPRE reiniciar si falla
    command: postgres -c max_connections=50 -c shared_buffers=256MB
    environment:
      POSTGRES_DB: sistema_ocr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_MX.UTF-8"
      TZ: America/Mexico_City
      PGTZ: America/Mexico_City
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts:/docker-entrypoint-initdb.d
      - ./backups:/backups
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any           # Reiniciar SIEMPRE que falle
        delay: 5s
        max_attempts: 0          # Intentos ilimitados
        window: 120s

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      pull: false  # No descargar imágenes base durante build
    pull_policy: never  # No descargar de internet, solo usar imagen local
    container_name: sistema_ocr_backend
    restart: always  # SIEMPRE reiniciar si falla
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sistema_ocr
      DB_USER: postgres
      DB_PASSWORD: 1234
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-default-secret-key-change-in-production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      TZ: America/Mexico_City
      # Configuración para procesos largos
      UVICORN_TIMEOUT_KEEP_ALIVE: 300
      UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN: 60
      # Configuración de Worker Pool para multithreading
      OCR_MAX_WORKERS: 4  # Número de tomos procesándose simultáneamente
    ports:
      - "8000:8000"
      - "8443:8443"
    volumes:
      - ./backend:/app  # 🔥 Hot reload: cambios en código se reflejan automáticamente
      - documentos_data:/app/uploads
      - fgjcdmx_data:/FGJCDMX
      - system_logs:/app/logs  # Logs de errores del sistema
    networks:
      - sistema_ocr_network
    # Healthcheck más permisivo para procesos OCR largos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s        # Cada 60 segundos (antes 30s)
      timeout: 30s         # Timeout de 30 segundos (antes 10s)
      retries: 5           # 5 intentos (antes 3)
      start_period: 60s    # Dar 60s antes de empezar health checks
    # Recursos dedicados para multithreading y evitar bloqueos
    deploy:
      resources:
        limits:
          cpus: '6.0'      # Aumentado a 6 CPUs para multithreading
          memory: 12G      # Aumentado a 12GB RAM para múltiples procesos
        reservations:
          cpus: '4.0'      # Mínimo 4 CPUs garantizados
          memory: 8G       # Mínimo 8GB RAM garantizados
      restart_policy:
        condition: any           # Reiniciar SIEMPRE que falle
        delay: 5s                # Esperar 5s antes de reiniciar
        max_attempts: 0          # Intentos ilimitados (0 = infinito)
        window: 120s             # Ventana de tiempo para contar intentos

  # Nginx como servidor web para frontend
  nginx:
    image: nginx:alpine
    pull_policy: never  # No descargar de internet, solo usar imagen local
    container_name: sistema_ocr_nginx
    restart: always  # SIEMPRE reiniciar si falla
    depends_on:
      backend:
        condition: service_healthy  # Esperar a que el backend esté saludable
    ports:
      - "80:80"  # Puerto 80 para acceso local y red
      - "443:443"  # Puerto 443 para HTTPS
    extra_hosts:
      - "sistema-ocr.local:172.22.134.61"
      - "fgj-ocr.local:172.22.134.61"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      restart_policy:
        condition: any           # Reiniciar SIEMPRE que falle
        delay: 3s
        max_attempts: 0          # Intentos ilimitados
        window: 60s

  # Redis para caché y sesiones
  redis:
    image: redis:7-alpine
    container_name: sistema_ocr_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 2G

  # Celery Worker para procesamiento asíncrono
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      pull: false
    container_name: sistema_ocr_celery_worker
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sistema_ocr
      DB_USER: postgres
      DB_PASSWORD: 1234
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TZ: America/Mexico_City
    volumes:
      - ./backend:/app
      - documentos_data:/app/uploads
      - fgjcdmx_data:/FGJCDMX
      - system_logs:/app/logs
    networks:
      - sistema_ocr_network
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # Celery Beat para tareas programadas
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      pull: false
    container_name: sistema_ocr_celery_beat
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sistema_ocr
      DB_USER: postgres
      DB_PASSWORD: 1234
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TZ: America/Mexico_City
    volumes:
      - ./backend:/app
      - system_logs:/app/logs
    networks:
      - sistema_ocr_network
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # Elasticsearch para búsquedas avanzadas
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: sistema_ocr_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - sistema_ocr_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  # MinIO para almacenamiento de objetos (PDFs, imágenes)
  minio:
    image: minio/minio:latest
    container_name: sistema_ocr_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - sistema_ocr_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus para métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: sistema_ocr_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - sistema_ocr_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # Grafana para dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: sistema_ocr_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sistema_ocr_network
    depends_on:
      - prometheus

  # PgAdmin para administración de BD (opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    # pull_policy: never  # Permitir descarga de imagen si no existe localmente
    container_name: sistema_ocr_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fiscalia.gob.mx
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sistema_ocr_network
    depends_on:
      - postgres

  # Servidor DNS para resolver sistema-ocr.local en TODA LA RED
  dns-server:
    image: jpillora/dnsmasq
    container_name: sistema_ocr_dns
    restart: always
    ports:
      - "172.22.134.61:53:53/udp"  # DNS UDP - bind a IP específica
      - "172.22.134.61:53:53/tcp"  # DNS TCP - bind a IP específica
      - "8080:8080"  # Panel web
    environment:
      - HTTP_USER=admin
      - HTTP_PASS=admin123
    command: >
      --listen-address=0.0.0.0
      --address=/sistema-ocr/172.22.134.61
      --address=/sistema-ocr.local/172.22.134.61
      --address=/www.sistema-ocr/172.22.134.61
      --address=/www.sistema-ocr.local/172.22.134.61
      --address=/fgj-ocr/172.22.134.61
      --address=/fgj-ocr.local/172.22.134.61
      --server=172.19.19.42
      --server=172.40.112.62
      --server=8.8.8.8
      --cache-size=1000
      --log-queries
    networks:
      - sistema_ocr_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  documentos_data:
    driver: local
  fgjcdmx_data:
    driver: local
  system_logs:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  sistema_ocr_network:
    driver: bridge
